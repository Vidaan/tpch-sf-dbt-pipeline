name: 'tpch-sf-dbt-pipeline'

config-version: 2
version: '1.0.0'

profile: 'tpch-sf-dbt-pipeline'

model-paths: ["models"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  marts:
    +materialized: table
  staging:
    +materialized: view
  semantic:
    +materialized: ephemeral